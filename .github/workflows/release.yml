name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          xcodebuild \
            -project Wopener.xcodeproj \
            -scheme Wopener \
            -configuration Release \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package
        run: |
          mkdir -p dmg-stage
          cp -R build/Build/Products/Release/Wopener.app dmg-stage/
          ln -s /Applications dmg-stage/Applications
          hdiutil create \
            -volname Wopener \
            -srcfolder dmg-stage \
            -fs HFS+ \
            -format UDZO \
            -ov \
            Wopener.dmg

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: Wopener.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
