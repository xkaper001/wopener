name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
  TEAM_ID: "477V8AD7PH"

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg=Wopener-$VERSION.dmg" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Prepend our keychain to the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm "$RUNNER_TEMP/cert.p12"

      - name: Archive (Developer ID, hardened runtime)
        run: |
          xcodebuild archive \
            -project Wopener.xcodeproj \
            -scheme Wopener \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/Wopener.xcarchive" \
            MARKETING_VERSION="${{ steps.ver.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_APP_SANDBOX=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime"

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Wopener.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Build DMG
        run: |
          STAGE="$RUNNER_TEMP/dmg"
          mkdir -p "$STAGE"
          cp -R "$RUNNER_TEMP/export/Wopener.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname Wopener \
            -srcfolder "$STAGE" \
            -fs HFS+ \
            -format UDZO \
            -ov \
            "${{ steps.ver.outputs.dmg }}"

      - name: Notarize and staple
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/ac_api.p8"
          xcrun notarytool submit "${{ steps.ver.outputs.dmg }}" \
            --key "$RUNNER_TEMP/ac_api.p8" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "${{ steps.ver.outputs.dmg }}"
          xcrun stapler validate "${{ steps.ver.outputs.dmg }}"
          rm "$RUNNER_TEMP/ac_api.p8"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: ${{ steps.ver.outputs.dmg }}
          generate_release_notes: true
          fail_on_unmatched_files: true
