name: Bump Homebrew Cask

on:
  workflow_call:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg=Wopener-$VERSION.dmg" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute sha256
        id: hash
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.ver.outputs.version }}/${{ steps.ver.outputs.dmg }}"
          for i in 1 2 3 4 5; do
            curl -fSL "$URL" -o release.dmg && break || { echo "retry $i"; sleep 10; }
          done
          test -s release.dmg
          echo "sha256=$(sha256sum release.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: xkaper001/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask
        run: |
          CASK="tap/Casks/wopener.rb"
          sed -E -i \
            -e "s/version \".*\"/version \"${{ steps.ver.outputs.version }}\"/" \
            -e "s/sha256 \".*\"/sha256 \"${{ steps.hash.outputs.sha256 }}\"/" \
            "$CASK"
          echo "--- updated cask ---"; cat "$CASK"

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/wopener.rb
          git commit -m "wopener ${{ steps.ver.outputs.version }}" || { echo "no changes"; exit 0; }
          git push
